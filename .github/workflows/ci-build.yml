name: ci

on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  validate-metadata:
    name: "validate package metadata"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
    - name: Validate optional dependency relationships
      run: |
        python - <<'PY'
        import tomllib
        from pathlib import Path

        pyproject = Path("pyproject.toml")
        data = tomllib.loads(pyproject.read_text())
        optional = data["project"]["optional-dependencies"]

        dataflow = set(optional.get("dataflow", []))
        examples = set(optional.get("examples", []))

        missing = sorted(dataflow - examples)
        if missing:
          print("The [examples] extra must include all [dataflow] dependencies.")
          print("Missing from examples:")
          for dep in missing:
            print(f"- {dep}")
          raise SystemExit(1)

        print("Optional dependency check passed: dataflow is a subset of examples.")
        PY

  build:
    name: "python ${{ matrix.python-version }} tests"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [
          "3.11",
          "3.12",
          "3.13",
        ]
    permissions:
      id-token: write  # This is required for requesting the JWT.
    steps:
    - name: Cancel previous
      uses: styfle/cancel-workflow-action@0.13.1
      with:
        access_token: ${{ github.token }}
      if: ${{github.ref != 'refs/head/main'}}
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    - name: Install Xee
      run: |
        pip install -e .[tests]
    - uses: 'actions/checkout@v7'
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v3'
      with:
        service_account: ${{ secrets.SERVICE_ACCOUNT }}
        workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
    - name: Run unit tests
      run: |
        pytest xee
